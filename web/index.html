<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WebShell Blog</title>
    <link rel="stylesheet" href="lib/xterm.css">
    <style>
        /* Snazzy Theme Colors */
        :root {
            --bg: #282a36;
            --bg-alt: #1e1f29;
            --fg: #f8f8f2;
            --comment: #6272a4;
            --pink: #ff79c6;
            --green: #50fa7b;
            --orange: #ffb86c;
            --purple: #bd93f9;
            --yellow: #f1fa8c;
            --cyan: #8be9fd;
            --red: #ff5555;
            --border: #44475a;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Consolas, monospace; 
            background: var(--bg);
            color: var(--fg);
            height: 100vh;
            overflow: hidden;
        }
        
        /* TUI Container */
        .tui-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 5px;
            gap: 5px;
        }
        
        /* TUI Title Bar */
        .tui-titlebar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 15px;
            background: var(--bg-alt);
            border: 1px solid var(--border);
            border-radius: 4px 4px 0 0;
        }
        .tui-titlebar-title {
            color: var(--pink);
            font-weight: bold;
            font-size: 14px;
        }
        .tui-titlebar-title span { color: var(--comment); font-weight: normal; }
        .tui-titlebar-btns {}
        .tui-titlebar-btn {
            padding: 4px 12px;
            margin-left: 5px;
            background: transparent;
            color: var(--fg);
            border: 1px solid var(--border);
            border-radius: 3px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
        }
        .tui-titlebar-btn:hover { border-color: var(--cyan); color: var(--cyan); }
        
        /* TUI Main Layout */
        .tui-main {
            display: flex;
            flex: 1;
            gap: 5px;
            overflow: hidden;
        }
        
        /* TUI Panel */
        .tui-panel {
            display: flex;
            flex-direction: column;
            background: var(--bg-alt);
            border: 1px solid var(--border);
            border-radius: 0;
            overflow: hidden;
        }
        
        .tui-panel:first-child { flex: 1; }
        .tui-panel:last-child { flex: 1; }
        
        /* TUI Panel Header */
        .tui-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }
        .tui-panel-title {
            color: var(--cyan);
            font-size: 13px;
            font-weight: bold;
        }
        .tui-panel-title::before {
            content: '▸ ';
            color: var(--green);
        }
        
        /* TUI Panel Content */
        .tui-panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }
        
        /* TUI Border decorations */
        .tui-panel:first-child .tui-panel-header .tui-panel-title::before { content: '▸ '; }
        .tui-panel:last-child .tui-panel-header .tui-panel-title::before { content: '▸ '; }
        
        /* Terminal */
        #terminal {
            height: 100%;
            background: var(--bg);
            padding: 10px;
        }
        
        /* File Browser */
        .file-list {
            padding: 0;
        }
        
        .file-item {
            display: flex;
            align-items: center;
            padding: 8px 15px;
            border-bottom: 1px solid var(--bg);
            cursor: pointer;
            transition: background 0.1s;
        }
        .file-item:hover { background: var(--bg); }
        .file-item:hover .file-name { color: var(--green); }
        .file-item.selected { background: var(--bg); }
        .file-item.selected .file-name { color: var(--pink); }
        
        .file-icon { margin-right: 10px; width: 20px; text-align: center; }
        .file-icon.folder { color: var(--cyan); }
        .file-icon.file { color: var(--fg); }
        .file-icon.article { color: var(--yellow); }
        .file-icon.back { color: var(--orange); }
        
        .file-name { flex: 1; font-size: 13px; }
        .file-meta { color: var(--comment); font-size: 11px; }
        
        /* Breadcrumb */
        .tui-breadcrumb {
            display: flex;
            align-items: center;
            padding: 6px 12px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }
        .tui-breadcrumb span { cursor: pointer; color: var(--purple); }
        .tui-breadcrumb span:hover { color: var(--pink); text-decoration: underline; }
        .tui-breadcrumb .sep { color: var(--comment); margin: 0 5px; }
        
        /* TUI Status Bar */
        .tui-statusbar {
            display: flex;
            justify-content: space-between;
            padding: 6px 15px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 0 0 4px 4px;
            font-size: 12px;
        }
        .tui-statusbar-left { color: var(--comment); }
        .tui-statusbar-right { color: var(--comment); }
        .tui-statusbar-right span { color: var(--green); margin-left: 15px; }
        
        /* Preview Panel - TUI Style */
        .preview-panel {
            display: none;
            background: var(--bg-alt);
            border-left: 1px solid var(--border);
            overflow: hidden;
        }
        
        .preview-panel.active { 
            display: flex;
            flex-direction: column;
            flex: 1.5;
        }
        
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 15px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }
        .preview-title { color: var(--yellow); font-size: 14px; font-weight: bold; }
        .preview-close { 
            background: transparent; 
            color: var(--red); 
            border: 1px solid var(--red); 
            padding: 3px 10px; 
            border-radius: 3px; 
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
        }
        .preview-close:hover { background: var(--red); color: var(--bg); }
        
        .preview-meta { 
            color: var(--comment); 
            margin-bottom: 15px; 
            font-size: 12px;
            padding: 8px 15px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }
        .preview-content { 
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            line-height: 1.7;
            font-size: 13px;
        }
        .preview-content img { max-width: 100%; border: 1px solid var(--border); border-radius: 4px; margin: 15px 0; }
        .preview-content h2 { color: var(--green); margin: 20px 0 10px; font-size: 16px; }
        .preview-content h3 { color: var(--cyan); margin: 15px 0 8px; font-size: 14px; }
        .preview-content p { margin: 10px 0; }
        .preview-content pre { background: var(--bg); padding: 12px; border-radius: 4px; overflow-x: auto; border: 1px solid var(--border); }
        .preview-content code { background: var(--bg); padding: 2px 5px; border-radius: 3px; color: var(--orange); font-size: 12px; }
        .preview-content pre code { background: none; padding: 0; color: var(--fg); }
        .preview-content blockquote { 
            border-left: 3px solid var(--purple); 
            padding-left: 12px; 
            color: var(--comment);
            margin: 15px 0;
            font-style: italic;
        }
        .preview-content ul { padding-left: 20px; }
        .preview-content li { margin: 5px 0; }
        .preview-content .tag {
            display: inline-block;
            padding: 2px 8px;
            background: var(--bg);
            color: var(--pink);
            border-radius: 3px;
            font-size: 11px;
            margin-right: 5px;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--comment); }
    </style>
</head>
<body>
    <div class="tui-container">
        <!-- Title Bar -->
        <div class="tui-titlebar">
            <div class="tui-titlebar-title">WebShell Blog <span>// Terminal-style Blog System</span></div>
            <div class="tui-titlebar-btns">
                <button class="tui-titlebar-btn" onclick="showAbout()">about</button>
                <button class="tui-titlebar-btn" onclick="termClear()">clear</button>
                <button class="tui-titlebar-btn" onclick="refreshBrowser()">refresh</button>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="tui-main">
            <!-- Terminal Panel -->
            <div class="tui-panel">
                <div class="tui-panel-header">
                    <div class="tui-panel-title">Terminal</div>
                </div>
                <div class="tui-panel-content">
                    <div id="terminal"></div>
                </div>
            </div>
            
            <!-- Browser Panel -->
            <div class="tui-panel" id="browser-panel">
                <div class="tui-panel-header">
                    <div class="tui-panel-title">Explorer</div>
                    <div class="browser-path" id="browser-path">~</div>
                </div>
                <div class="tui-breadcrumb" id="breadcrumb">
                    <span onclick="navigateTo('/home')">~</span>
                </div>
                <div class="tui-panel-content file-list" id="file-list">
                    <!-- Dynamic content -->
                </div>
            </div>
            
            <!-- Preview Panel -->
            <div class="preview-panel" id="preview-panel">
                <div class="preview-header">
                    <div class="preview-title" id="preview-title">Article Preview</div>
                    <button class="preview-close" onclick="closePreview()">[x] close</button>
                </div>
                <div class="preview-meta" id="preview-meta"></div>
                <div class="preview-content" id="preview-content"></div>
            </div>
        </div>
        
        <!-- Status Bar -->
        <div class="tui-statusbar">
            <div class="tui-statusbar-left">
                <span id="status-path">/home</span>
            </div>
            <div class="tui-statusbar-right">
                <span>Tab: autocomplete</span>
                <span>Ctrl+C: interrupt</span>
                <span>↑↓: history</span>
            </div>
        </div>
    </div>

    <script src="lib/xterm.js"></script>
    <script src="lib/xterm-addon-fit.js"></script>
    <script>
        // ==================== 文件系统数据 ====================
        const fileSystem = {
            home: {
                type: 'dir',
                children: {
                    'articles': { type: 'dir', children: {} },
                    'posts': { type: 'dir', children: {} },
                    'readme.md': { type: 'file', content: 'Welcome to WebShell Blog!' }
                }
            }
        };

        // 文章分类数据
        const categories = {
            articles: {
                name: '技术文章',
                icon: '📁',
                children: {
                    'frontend': {
                        name: '前端技术',
                        icon: '🎨',
                        articles: [
                            { id: 1, title: 'Xterm.js 终端开发指南', date: '2024-01-15', author: 'Dev', tags: ['Xterm.js', '前端'], desc: '详细介绍 Xterm.js 的使用方法。', images: ['https://picsum.photos/600/300?1'] },
                            { id: 2, title: 'CSS Grid 布局详解', date: '2024-01-20', author: 'UI', tags: ['CSS', '布局'], desc: '深入理解 CSS Grid 布局系统。', images: ['https://picsum.photos/600/300?2'] }
                        ]
                    },
                    'backend': {
                        name: '后端技术',
                        icon: '⚙️',
                        articles: [
                            { id: 3, title: 'Go WebSocket 实战', date: '2024-01-25', author: 'Backend', tags: ['Go', 'WebSocket'], desc: '使用 Go 实现 WebSocket 服务器。', images: ['https://picsum.photos/600/300?3'] },
                            { id: 4, title: 'RESTful API 设计原则', date: '2024-02-01', author: 'API', tags: ['API', '架构'], desc: 'RESTful API 设计的最佳实践。', images: ['https://picsum.photos/600/300?4'] }
                        ]
                    },
                    'devops': {
                        name: '运维部署',
                        icon: '🚀',
                        articles: [
                            { id: 5, title: 'Docker 容器化部署', date: '2024-02-05', author: 'Ops', tags: ['Docker', '容器'], desc: 'Docker 容器化部署实战。', images: ['https://picsum.photos/600/300?5'] }
                        ]
                    }
                }
            },
            posts: {
                name: '随笔',
                icon: '📝',
                children: {
                    'life': {
                        name: '生活随笔',
                        icon: '🌱',
                        articles: [
                            { id: 6, title: '我的 2024 年计划', date: '2024-01-01', author: 'Me', tags: ['计划'], desc: '新一年的目标与规划。', images: ['https://picsum.photos/600/300?6'] }
                        ]
                    },
                    'tech': {
                        name: '技术分享',
                        icon: '💡',
                        articles: [
                            { id: 7, title: '如何高效学习新技术', date: '2024-01-30', author: 'Me', tags: ['学习'], desc: '分享我的学习方法与经验。', images: ['https://picsum.photos/600/300?7'] }
                        ]
                    }
                }
            }
        };

        // ==================== 终端初始化 ====================
        // Snazzy Theme for Xterm
        const term = new Terminal({
            cursorBlink: true,
            cursorStyle: 'block',
            fontSize: 13,
            fontFamily: '"Cascadia Code", "Fira Code", "JetBrains Mono", Consolas, monospace',
            scrollback: 1000,
            theme: {
                background: '#282a36',
                foreground: '#f8f8f2',
                cursor: '#f8f8f2',
                cursorAccent: '#282a36',
                selectionBackground: '#44475a',
                black: '#21222c',
                red: '#ff5555',
                green: '#50fa7b',
                yellow: '#f1fa8c',
                blue: '#bd93f9',
                magenta: '#ff79c6',
                cyan: '#8be9fd',
                white: '#f8f8f2',
                brightBlack: '#6272a4',
                brightRed: '#ff6e6e',
                brightGreen: '#69ff94',
                brightYellow: '#ffffa5',
                brightBlue: '#d6acff',
                brightMagenta: '#ff92df',
                brightCyan: '#a4ffff',
                brightWhite: '#ffffff'
            }
        });
        
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal'));
        fitAddon.fit();

        let cwd = '/home';
        let input = '';
        const cmdHistory = [];
        let historyIndex = -1;
        let currentBrowsePath = '/home';

        // 初始化浏览器
        function initBrowser() {
            updateBrowserPath('/home');
            renderFileList('/home');
        }

        function updateBrowserPath(path) {
            currentBrowsePath = path;
            cwd = path;
            const parts = path.split('/').filter(p => p);
            let html = '<span onclick="navigateTo(\'/home\')">~</span>';
            let full = '/home';
            parts.slice(1).forEach(p => {
                full += '/' + p;
                html += ' / <span onclick="navigateTo(\'' + full + '\')">' + p + '</span>';
            });
            document.getElementById('browser-path').innerHTML = html;
            
            // 更新面包屑
            document.getElementById('breadcrumb').innerHTML = '<span onclick="navigateTo(\'/home\')">~</span>' + 
                parts.slice(1).map((p, i) => {
                    let fp = '/home/' + parts.slice(1, i + 2).join('/');
                    return ' <span class="sep">/</span> <span onclick="navigateTo(\'' + fp + '\')">' + p + '</span>';
                }).join('');
            
            // 更新状态栏
            document.getElementById('status-path').textContent = path;
        }

        function renderFileList(path) {
            const list = document.getElementById('file-list');
            const parts = path.split('/').filter(p => p);
            
            if (parts.length === 1) {
                // /home - 显示主目录
                let html = '';
                Object.keys(categories).forEach(key => {
                    const cat = categories[key];
                    html += `
                        <div class="file-item" onclick="enterCategory('${key}')">
                            <span class="file-icon folder">${cat.icon}</span>
                            <span class="file-name">${cat.name}</span>
                            <span class="file-meta">分类</span>
                        </div>
                    `;
                });
                html += `
                    <div class="file-item" onclick="viewFile('readme.md')">
                        <span class="file-icon file">📄</span>
                        <span class="file-name">readme.md</span>
                        <span class="file-meta">帮助</span>
                    </div>
                `;
                list.innerHTML = html;
            } else if (parts.length === 2 && categories[parts[1]]) {
                // /home/articles 或 /home/posts - 显示子分类
                const cat = categories[parts[1]];
                let html = `
                    <div class="file-item" onclick="goBack()">
                        <span class="file-icon folder">↩️</span>
                        <span class="file-name">..</span>
                        <span class="file-meta">返回上级</span>
                    </div>
                `;
                Object.keys(cat.children).forEach(key => {
                    const sub = cat.children[key];
                    html += `
                        <div class="file-item" onclick="enterSubCategory('${parts[1]}', '${key}')">
                            <span class="file-icon folder">${sub.icon}</span>
                            <span class="file-name">${sub.name}</span>
                            <span class="file-meta">${sub.articles.length} 篇</span>
                        </div>
                    `;
                });
                list.innerHTML = html;
            } else if (parts.length === 3) {
                // /home/articles/frontend 等 - 显示文章列表
                const catName = parts[1];
                const subName = parts[2];
                const cat = categories[catName];
                const sub = cat?.children[subName];
                if (sub) {
                    let html = `
                        <div class="file-item" onclick="goBack()">
                            <span class="file-icon folder">↩️</span>
                            <span class="file-name">..</span>
                            <span class="file-meta">返回上级</span>
                        </div>
                    `;
                    sub.articles.forEach(art => {
                        html += `
                            <div class="file-item" onclick="previewArticle(${art.id})">
                                <span class="file-icon article">📄</span>
                                <span class="file-name">${art.title}</span>
                                <span class="file-meta">${art.date}</span>
                            </div>
                        `;
                    });
                    list.innerHTML = html;
                }
            }
        }

        function enterCategory(key) {
            const path = '/home/' + key;
            cwd = path;
            updateBrowserPath(path);
            renderFileList(path);
            term.writeln('\x1b[32m[cd ' + key + ']\x1b[0m');
            term.writeln('\x1b[90mUse \x1b[36mls\x1b[90m to view contents, \x1b[36mcd <name>\x1b[90m to enter subdirectory\x1b[0m');
            term.writeln('');
            term.write('\x1b[1m\x1b[36m' + cwd + '$\x1b[0m ');
        }

        function enterSubCategory(cat, sub) {
            const path = '/home/' + cat + '/' + sub;
            cwd = path;
            updateBrowserPath(path);
            renderFileList(path);
            term.writeln('\x1b[32m[cd ' + sub + ']\x1b[0m');
            term.writeln('\x1b[90mUse \x1b[36mls\x1b[90m to list articles, \x1b[36mread <id>\x1b[90m to preview\x1b[0m');
            term.writeln('');
            term.write('\x1b[1m\x1b[36m' + cwd + '$\x1b[0m ');
        }

        function navigateTo(path) {
            cwd = path;
            updateBrowserPath(path);
            renderFileList(path);
            
            // 显示当前路径和提示
            const parts = cwd.split('/').filter(p => p);
            if (parts.length === 1) {
                term.writeln('\x1b[90mWelcome to home directory.\x1b[0m');
            } else if (parts.length === 2) {
                term.writeln('\x1b[90mEntering ' + parts[1] + ' directory...\x1b[0m');
                term.writeln('\x1b[33mUse \x1b[36mls\x1b[33m to view contents, \x1b[36mcd <dir>\x1b[33m to enter.\x1b[0m');
            } else if (parts.length === 3) {
                term.writeln('\x1b[90mEntering ' + parts[2] + '...\x1b[0m');
                term.writeln('\x1b[33mUse \x1b[36mls\x1b[33m to list articles.\x1b[0m');
            }
            term.writeln('');
            term.write('\x1b[1m\x1b[36m' + cwd + '$\x1b[0m ');
        }

        function goBack() {
            const parts = cwd.split('/').filter(p => p);
            if (parts.length > 1) {
                parts.pop();
                const newPath = parts.length === 1 ? '/home' : '/' + parts.join('/');
                navigateTo(newPath);
            }
        }

        function viewFile(filename) {
            if (filename === 'readme.md') {
                term.writeln('\x1b[1m# WebShell Blog\x1b[0m');
                term.writeln('\x1b[32mA terminal-style blog system\x1b[0m');
                term.writeln('');
                term.writeln('\x1b[33mCommands:\x1b[0m');
                term.writeln('  ls          - list files');
                term.writeln('  cd <dir>    - change directory');
                term.writeln('  cat <file>  - read file');
                term.writeln('  read <id>   - read article');
                term.writeln('');
                term.writeln('\x1b[34m' + cwd + '$\x1b[0m ');
            }
        }

        function previewArticle(id) {
            // 查找文章
            let article = null;
            Object.values(categories).forEach(cat => {
                Object.values(cat.children).forEach(sub => {
                    const found = sub.articles.find(a => a.id === id);
                    if (found) article = found;
                });
            });
            
            if (article) {
                document.getElementById('preview-title').textContent = article.title;
                document.getElementById('preview-meta').innerHTML = `📅 ${article.date} | 👤 ${article.author} | ${article.tags.map(t => `<span style="background:#333;padding:2px 8px;border-radius:4px;margin-right:5px;">${t}</span>`).join('')}`;
                
                let content = `<p>${article.desc}</p><br><h2>文章内容</h2><p>这是文章的详细内容区域，支持富文本、代码、图片等格式。</p>`;
                if (article.images) {
                    article.images.forEach(img => {
                        content += `<br><img src="${img}" alt="${article.title}">`;
                    });
                }
                
                document.getElementById('preview-content').innerHTML = content;
                document.getElementById('preview-panel').classList.add('active');
                document.getElementById('browser-panel').style.width = '40%';
                
                term.writeln('\x1b[32m[Opening article: ' + article.title + ']\x1b[0m');
                term.writeln('\x1b[34m' + cwd + '$\x1b[0m ');
            }
        }

        function closePreview() {
            document.getElementById('preview-panel').classList.remove('active');
            document.getElementById('browser-panel').style.width = '50%';
        }

        function refreshBrowser() {
            renderFileList(currentBrowsePath);
            term.writeln('\x1b[32m[Refreshed]\x1b[0m');
            term.writeln('\x1b[34m' + cwd + '$\x1b[0m ');
        }

        function termClear() {
            term.clear();
            term.writeln('\x1b[1m\x1b[35mWebShell Blog v1.0\x1b[0m \x1b[90m// Terminal-style Blog System\x1b[0m');
            term.writeln('\x1b[90mType \x1b[36m"help"\x1b[90m for available commands.\x1b[0m');
            term.writeln('');
            term.write('\x1b[1m\x1b[36m' + cwd + '$\x1b[0m ');
        }

        // ==================== 终端命令处理 ====================
        term.writeln('\x1b[1m\x1b[35mWebShell Blog v1.0\x1b[0m \x1b[90m// Terminal-style Blog System\x1b[0m');
        term.writeln('\x1b[90mType \x1b[36m"help"\x1b[90m for available commands.\x1b[0m');
        term.writeln('');
        term.writeln('\x1b[33mQuick Start:\x1b[0m');
        term.writeln('  \x1b[36mls\x1b[0m              View directories');
        term.writeln('  \x1b[36mcd articles\x1b[0m     Enter articles folder');
        term.writeln('  \x1b[36mread 1\x1b[0m          Read article');
        term.writeln('');
        term.write('\x1b[1m\x1b[36m' + cwd + '$\x1b[0m ');

        term.onData(data => {
            if (data === '\r') {
                term.writeln('');
                const cmd = input.trim();
                if (cmd) {
                    cmdHistory.push(cmd);
                    historyIndex = cmdHistory.length;
                }
                processCommand(cmd);
                input = '';
                term.write('\x1b[1m\x1b[36m' + cwd + '$\x1b[0m ');
            } else if (data === '\x7f') {
                if (input.length > 0) {
                    input = input.slice(0, -1);
                    redrawInput();
                }
            } else if (data === '\x1b[A') {
                if (cmdHistory.length > 0 && historyIndex > 0) {
                    historyIndex--;
                    input = cmdHistory[historyIndex];
                    redrawInput();
                }
            } else if (data === '\x1b[B') {
                if (historyIndex < cmdHistory.length - 1) {
                    historyIndex++;
                    input = cmdHistory[historyIndex];
                } else {
                    historyIndex = cmdHistory.length;
                    input = '';
                }
                redrawInput();
            } else if (data === '\x03') {
                input = '';
                term.writeln('^C');
                term.write('\x1b[1m\x1b[36m' + cwd + '$\x1b[0m ');
            } else if (data === '\t') {
                const result = tabComplete(input);
                if (result.showItems) {
                    // 空输入时显示目录列表后重新显示提示符
                    term.writeln('');
                    term.write('\x1b[1m\x1b[36m' + cwd + '$\x1b[0m ');
                } else if (result.input !== input) {
                    input = result.input;
                    redrawInput();
                }
            } else {
                input += data;
                term.write(data);
            }
        });
        
        // 重新绘制当前输入行（正确处理中文）
        function redrawInput() {
            // 回到行首，清除到行尾，重新绘制
            term.write('\r\x1b[K' + '\x1b[1m\x1b[36m' + cwd + '$\x1b[0m ' + input);
        }

        // Tab completion
        function tabComplete(input) {
            const commands = ['ls', 'll', 'cd', 'cat', 'pwd', 'clear', 'cls', 'read', 'echo', 'help', 'history', 'whoami', 'date', 'exit', 'man', 'uname'];
            
            // If input is empty, show current directory contents
            if (!input.trim()) {
                let items = [];
                if (cwd === '/home') {
                    items = ['articles/', 'posts/', 'readme.md'];
                } else if ((cwd.startsWith('/home/articles') || cwd.startsWith('/home/posts')) && cwd.split('/').length === 3) {
                    const catKey = cwd.split('/')[2];
                    const cat = categories[catKey];
                    if (cat) {
                        items = Object.values(cat.children).map(c => c.name + '/');
                    }
                } else if (cwd.startsWith('/home/articles/') || cwd.startsWith('/home/posts/')) {
                    const catKey = cwd.split('/')[2];
                    const cat = categories[catKey];
                    if (cat) {
                        for (const key in cat.children) {
                            if (cat.children[key]) {
                                items.push(cat.children[key].articles.map(a => a.id + '.md'));
                            }
                        }
                        items = items.flat();
                    }
                }
                if (items.length > 0) {
                    term.writeln(items.join('    '));
                }
                return { input: input, showItems: true };
            }
            
            const parts = input.trim().split(/\s+/);
            
            if (parts.length === 1) {
                // Complete command name
                const cmd = parts[0];
                const matches = commands.filter(c => c.startsWith(cmd));
                if (matches.length === 1) {
                    return { input: matches[0] + ' ' };
                } else if (matches.length > 1) {
                    term.writeln('');
                    term.writeln(matches.join('  '));
                }
                return { input: input };
            }
            
            const cmd = parts[0];
            const arg = parts[1] || '';
            
            // ls 命令补全
            if (cmd === 'ls') {
                const lsOptions = ['-l', '-a', '-al', '-la'];
                if (!arg.startsWith('-')) {
                    return { input: cmd + ' -l ' };
                }
                const matches = lsOptions.filter(o => o.startsWith(arg));
                if (matches.length === 1) {
                    return { input: cmd + ' ' + matches[0] + ' ' };
                } else if (matches.length > 1) {
                    term.writeln('');
                    term.writeln(matches.join('  '));
                }
                return { input: input };
            }
            
            // ll 命令（等同于 ls -la）
            if (cmd === 'll') {
                return { input: cmd + ' ' };
            }
            
            if (cmd === 'cd' || cmd === 'cat' || cmd === 'read') {
                let completions = [];
                
                if (cmd === 'cd') {
                    // 支持相对路径补全，如 ../, ../
                    if (arg.startsWith('..')) {
                        // 计算相对路径目标目录
                        let targetCwd = cwd;
                        const parts = arg.split('/').filter(p => p);
                        for (const p of parts) {
                            if (p === '..') {
                                const currentParts = targetCwd.split('/').filter(pp => pp);
                                if (currentParts.length > 1) {
                                    currentParts.pop();
                                    targetCwd = '/' + currentParts.join('/');
                                }
                            }
                        }
                        
                        // 获取目标目录的内容
                        if (targetCwd === '/home') {
                            completions = Object.keys(categories);
                        } else if ((targetCwd.startsWith('/home/articles') || targetCwd.startsWith('/home/posts')) && targetCwd.split('/').length === 3) {
                            const catKey = targetCwd.split('/')[2];
                            const cat = categories[catKey];
                            if (cat) {
                                completions = Object.values(cat.children).map(c => c.name);
                            }
                        }
                        
                        // 加上相对路径前缀
                        const prefix = arg.replace(/[^/]/g, ''); // 保留 ../
                        completions = completions.map(c => prefix + c);
                    } else {
                        // 普通目录补全
                        if (cwd === '/home') {
                            completions = Object.keys(categories);
                            // 添加 .. 父目录选项
                            completions.unshift('..');
                        } else if ((cwd.startsWith('/home/articles') || cwd.startsWith('/home/posts')) && cwd.split('/').length === 3) {
                            const catKey = cwd.split('/')[2];
                            const cat = categories[catKey];
                            if (cat) {
                                completions = Object.values(cat.children).map(c => c.name);
                            }
                            // 添加 ../ 父目录选项
                            completions.unshift('../');
                        } else if (cwd.startsWith('/home/articles/') || cwd.startsWith('/home/posts/')) {
                            // 在子目录时，添加 ../ 返回上级
                            completions = ['../'];
                        }
                    }
                } else if (cmd === 'cat' || cmd === 'read') {
                    // Complete file/article names
                    if (arg === 'readme' || arg === 'readme.md') {
                        return { input: 'cat readme.md ' };
                    }
                    
                    if (cwd === '/home/articles' || cwd === '/home/posts') {
                        const catKey = cwd.split('/')[2];
                        const cat = categories[catKey];
                        if (cat) {
                            // 返回子分类的 name
                            completions = Object.values(cat.children).map(c => c.name);
                        }
                    } else if (cwd.startsWith('/home/articles/') || cwd.startsWith('/home/posts/')) {
                        const catKey = cwd.split('/')[2];
                        const cat = categories[catKey];
                        if (cat) {
                            // 找到匹配的子分类
                            for (const key in cat.children) {
                                if (key === arg || cat.children[key].name === arg) {
                                    const sub = cat.children[key];
                                    completions = sub.articles.map(a => String(a.id) + '.md');
                                    break;
                                }
                            }
                        }
                    }
                }
                
                // Filter by partial input
                if (arg) {
                    completions = completions.filter(c => c.startsWith(arg));
                }
                
                if (completions.length === 1) {
                    return { input: cmd + ' ' + completions[0] + (cmd === 'cd' ? '' : ' ') };
                } else if (completions.length > 1) {
                    term.writeln('');
                    term.writeln(completions.join('  '));
                }
                return { input: input };
            }
            
            return { input: input };
        }

        function processCommand(cmd) {
            const parts = cmd.trim().split(/\s+/);
            const c = parts[0].toLowerCase();
            const args = parts.slice(1);

            switch(c) {
                case '':
                    break;
                case 'help':
                case 'man':
                    showHelp();
                    break;
                case 'ls':
                    ls(args);
                    break;
                case 'cd':
                    cd(args);
                    break;
                case 'ls':
                case 'll':
                    ls(args, c === 'll');
                    break;
                case 'cat':
                    cat(args);
                    break;
                case 'cd':
                    cd(args);
                    break;
                case 'pwd':
                    term.writeln(cwd);
                    break;
                case 'clear':
                case 'cls':
                    term.clear();
                    term.writeln('\x1b[1m\x1b[35mWebShell Blog v1.0\x1b[0m \x1b[90m// Terminal-style Blog System\x1b[0m');
                    term.writeln('\x1b[90mType \x1b[36m"help"\x1b[90m for available commands.\x1b[0m');
                    term.writeln('');
                    term.write('\x1b[1m\x1b[36m' + cwd + '$\x1b[0m ');
                    break;
                case 'read':
                    readArticle(args);
                    break;
                case 'echo':
                    echo(args);
                    break;
                case 'whoami':
                    term.writeln('user');
                    break;
                case 'date':
                    term.writeln(new Date().toString());
                    break;
                case 'uname':
                    term.writeln(args.includes('-a') ? 
                        'WebShell Blog 1.0.0 x86_64 JavaScript/HTML/CSS' : 
                        'WebShell Blog');
                    break;
                case 'history':
                    history();
                    break;
                case 'man':
                    showHelp();
                    break;
                case 'exit':
                    term.writeln('\x1b[33mLogout not supported in web mode.\x1b[0m');
                    break;
                case 'about':
                    showAbout();
                    break;
                default:
                    term.writeln('\x1b[31mbash: ' + c + ': command not found\x1b[0m');
            }
        }

        function showHelp() {
            term.writeln('\x1b[1m\x1b[35mWebShell Blog v1.0\x1b[0m \x1b[90m// Terminal-style Blog System\x1b[0m');
            term.writeln('');
            term.writeln('\x1b[33mNavigation:\x1b[0m');
            term.writeln('  \x1b[36mls\x1b[0m              List directory contents');
            term.writeln('  \x1b[36mll\x1b[0m              List with details (like ls -la)');
            term.writeln('  \x1b[36mcd <dir>\x1b[0m         Change directory');
            term.writeln('  \x1b[36mpwd\x1b[0m              Print working directory');
            term.writeln('');
            term.writeln('\x1b[33mBlog Operations:\x1b[0m');
            term.writeln('  \x1b[36mcat <file>\x1b[0m        Display file (e.g. cat 1.md)');
            term.writeln('  \x1b[36mread <id>\x1b[0m          Read article in preview panel');
            term.writeln('  \x1b[36mlist\x1b[0m             Show article list');
            term.writeln('');
            term.writeln('\x1b[33mDirectory Structure:\x1b[0m');
            term.writeln('  \x1b[36m/home\x1b[0m              Home directory');
            term.writeln('    \x1b[36m├─ articles/\x1b[0m      Technical articles');
            term.writeln('    \x1b[36m│   ├─ frontend/\x1b[0m   Frontend articles');
            term.writeln('    \x1b[36m│   ├─ backend/\x1b[0m    Backend articles');
            term.writeln('    \x1b[36m│   └─ devops/\x1b[0m     DevOps articles');
            term.writeln('    \x1b[36m└─ posts/\x1b[0m          Personal posts');
            term.writeln('');
            term.writeln('\x1b[33mSystem:\x1b[0m');
            term.writeln('  \x1b[36mclear\x1b[0m             Clear screen');
            term.writeln('  \x1b[36mecho <text>\x1b[0m       Print text');
            term.writeln('  \x1b[36mhistory\x1b[0m            Show command history');
            term.writeln('  \x1b[36muname [-a]\x1b[0m        System information');
            term.writeln('  \x1b[36mabout\x1b[0m              About this blog');
            term.writeln('');
            term.writeln('\x1b[90mUse \x1b[36m↑/↓\x1b[90m arrows for history, \x1b[36mTab\x1b[90m for autocomplete\x1b[0m');
        }

        function ls(args, isLl = false) {
            const showLong = isLl || args.includes('-l') || args.includes('-la') || args.includes('-al');
            
            if (cwd === '/home') {
                const total = 3;
                term.writeln('\x1b[1mtotal ' + total + '\x1b[0m');
                if (showLong) {
                    term.writeln('\x1b[36mdrwxr-xr-x   2 user  staff   128 Jan 15 10:00 \x1b[0marticles/');
                    term.writeln('\x1b[36mdrwxr-xr-x   2 user  staff   128 Jan 15 10:00 \x1b[0mposts/');
                    term.writeln('\x1b[33m-rw-r--r--   1 user  staff   512 Jan 15 10:00 \x1b[0mreadme.md');
                } else {
                    term.writeln('\x1b[36marticles/\x1b[0m  \x1b[36mposts/\x1b[0m  \x1b[33mreadme.md\x1b[0m');
                }
            } else if (cwd.startsWith('/home/articles') || cwd.startsWith('/home/posts')) {
                const parts = cwd.split('/');
                const catKey = parts[2];
                const cat = categories[catKey];
                if (cat) {
                    if (parts.length === 3) {
                        const dirs = Object.values(cat.children);
                        term.writeln('\x1b[1mtotal ' + dirs.length + '\x1b[0m');
                        dirs.forEach(sub => {
                            if (showLong) {
                                term.writeln('\x1b[36mdrwxr-xr-x   ' + String(sub.articles.length).padStart(2) + ' \x1b[90muser  staff   \x1b[0m' + sub.name + '/');
                            } else {
                                term.writeln('\x1b[36m' + sub.name + '/\x1b[0m');
                            }
                        });
                    } else {
                        const subKey = parts[3];
                        const sub = cat.children[subKey];
                        if (sub) {
                            term.writeln('\x1b[1mtotal ' + sub.articles.length + '\x1b[0m');
                            sub.articles.forEach(art => {
                                if (showLong) {
                                    const size = art.desc.length + 100;
                                    term.writeln('\x1b[33m-rw-r--r--   1 \x1b[90muser  staff  \x1b[0m' + String(size).padStart(5) + ' \x1b[90m' + art.date + ' \x1b[33m' + art.id + '.md\x1b[0m');
                                } else {
                                    term.writeln('\x1b[33m' + art.id + '.md\x1b[0m');
                                }
                            });
                        }
                    }
                }
            }
        }

        function cd(args) {
            if (args.length === 0 || args[0] === '~') {
                cwd = '/home';
            } else if (args[0] === '/') {
                cwd = '/home';
            } else {
                // 解析相对路径
                let targetCwd = cwd;
                const input = args[0];
                
                // 处理 ../
                const parts = input.split('/');
                for (const part of parts) {
                    if (part === '..') {
                        const currentParts = targetCwd.split('/').filter(p => p);
                        if (currentParts.length > 1) {
                            currentParts.pop();
                            targetCwd = currentParts.length === 0 ? '/home' : '/' + currentParts.join('/');
                        }
                    } else if (part && part !== '.') {
                        // 尝试进入子目录
                        let found = false;
                        
                        if (targetCwd === '/home') {
                            if (categories[part]) {
                                targetCwd = '/home/' + part;
                                found = true;
                            }
                        } else if ((targetCwd.startsWith('/home/articles') || targetCwd.startsWith('/home/posts')) && targetCwd.split('/').length === 3) {
                            const catKey = targetCwd.split('/')[2];
                            const cat = categories[catKey];
                            if (cat) {
                                for (const key in cat.children) {
                                    if (key === part || cat.children[key].name === part) {
                                        targetCwd = '/home/' + catKey + '/' + key;
                                        found = true;
                                        break;
                                    }
                                }
                            }
                        }
                    }
                }
                
                cwd = targetCwd;
            }
            
            updateBrowserPath(cwd);
            renderFileList(cwd);
            
            // Show helpful hints
            const p = cwd.split('/').filter(pp => pp);
            if (p.length === 1) {
                term.writeln('\x1b[90mBack to home directory.\x1b[0m');
            } else if (p.length === 2) {
                term.writeln('\x1b[90mUse \x1b[36mls\x1b[90m to view contents, \x1b[36mcd <name>\x1b[90m to enter\x1b[0m');
            } else if (p.length === 3) {
                term.writeln('\x1b[90mUse \x1b[36mls\x1b[90m to list articles\x1b[0m');
            }
        }

        function cat(args) {
            if (args.length === 0) {
                term.writeln('\x1b[31mcat: missing operand\x1b[0m');
                return;
            }
            viewFile(args[0]);
        }

        function readArticle(args) {
            if (args.length === 0) {
                term.writeln('\x1b[31mread: missing article id\x1b[0m');
                return;
            }
            const id = parseInt(args[0]);
            let found = false;
            Object.values(categories).forEach(cat => {
                Object.values(cat.children).forEach(sub => {
                    const art = sub.articles.find(a => a.id === id);
                    if (art) {
                        previewArticle(art.id);
                        found = true;
                    }
                });
            });
            if (!found) {
                term.writeln('\x1b[31mread: article ' + id + ' not found\x1b[0m');
            }
        }

        function echo(args) {
            term.writeln(args.join(' '));
        }

        function history() {
            cmdHistory.forEach((cmd, i) => {
                term.writeln('\x1b[90m ' + (i + 1) + '  \x1b[0m' + cmd);
            });
        }
        
        function showAbout() {
            term.writeln('');
            term.writeln('\x1b[1m\x1b[35m╔══════════════════════════════════════════════════════╗\x1b[0m');
            term.writeln('\x1b[1m\x1b[35m║\x1b[0m  \x1b[1m\x1b[36mWebShell Blog\x1b[0m                                      \x1b[1m\x1b[35m║\x1b[0m');
            term.writeln('\x1b[1m\x1b[35m║\x1b[0m  \x1b[90mA terminal-style blog system\x1b[0m                   \x1b[1m\x1b[35m║\x1b[0m');
            term.writeln('\x1b[1m\x1b[35m╠══════════════════════════════════════════════════════╣\x1b[0m');
            term.writeln('\x1b[1m\x1b[35m║\x1b[0m  \x1b[33mAuthor:\x1b[0m  Admin                                   \x1b[1m\x1b[35m║\x1b[0m');
            term.writeln('\x1b[1m\x1b[35m║\x1b[0m  \x1b[33mVersion:\x1b[0m 1.0.0                                  \x1b[1m\x1b[35m║\x1b[0m');
            term.writeln('\x1b[1m\x1b[35m║\x1b[0m  \x1b[33mStack:\x1b[0m  Xterm.js + Vanilla JS                    \x1b[1m\x1b[35m║\x1b[0m');
            term.writeln('\x1b[1m\x1b[35m╚══════════════════════════════════════════════════════╝\x1b[0m');
            term.writeln('');
            term.writeln('\x1b[90mType \x1b[36m"help"\x1b[90m to see available commands.\x1b[0m');
            term.writeln('');
        }

        // 初始化
        initBrowser();
        window.onresize = () => fitAddon.fit();
    </script>
