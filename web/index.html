<html>
<head>

    <style>
        /* Snazzy Theme Colors */
        :root {
            --bg: #282a36;
            --bg-alt: #1e1f29;
            --fg: #f8f8f2;
            --comment: #6272a4;
            --pink: #ff79c6;
            --green: #50fa7b;
            --orange: #ffb86c;
            --purple: #bd93f9;
            --yellow: #f1fa8c;
            --cyan: #8be9fd;
            --red: #ff5555;
            --border: #44475a;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Consolas, monospace; 
            background: var(--bg);
            color: var(--fg);
            height: 100vh;
            overflow: hidden;
        }
        
        /* TUI Container */
        .tui-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 5px;
            gap: 5px;
        }
        
        /* TUI Title Bar */
        .tui-titlebar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 15px;
            background: var(--bg-alt);
            border: 1px solid var(--border);
            border-radius: 4px 4px 0 0;
        }
        .tui-titlebar-title {
            color: var(--pink);
            font-weight: bold;
            font-size: 14px;
        }
        .tui-titlebar-title span { color: var(--comment); font-weight: normal; }
        .tui-titlebar-btns {}
        .tui-titlebar-btn {
            padding: 4px 12px;
            margin-left: 5px;
            background: transparent;
            color: var(--fg);
            border: 1px solid var(--border);
            border-radius: 3px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
        }
        .tui-titlebar-btn:hover { border-color: var(--cyan); color: var(--cyan); }
        
        /* TUI Main Layout */
        .tui-main {
            display: flex;
            flex: 1;
            gap: 0;
            overflow: hidden;
        }
        
        /* Resizable Panels Container */
        .panels-wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        /* Resize Handle */
        .resize-handle {
            width: 5px;
            background: var(--border);
            cursor: col-resize;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .resize-handle:hover { background: var(--cyan); }
        .resize-handle.active { background: var(--cyan); }
        
        /* TUI Panel */
        .tui-panel {
            display: flex;
            flex-direction: column;
            background: var(--bg-alt);
            border: 1px solid var(--border);
            border-radius: 0;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        #terminal-panel {
            flex: 1;
            min-width: 200px;
        }
        
        #browser-panel {
            width: 280px;
        }
        
        #browser-panel.narrow {
            width: 220px;
        }
        
        /* TUI Panel Header */
        .tui-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }
        .tui-panel-title {
            color: var(--cyan);
            font-size: 13px;
            font-weight: bold;
        }
        .tui-panel-title::before {
            content: '▸ ';
            color: var(--green);
        }
        
        /* TUI Panel Content */
        .tui-panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }
        
        /* TUI Border decorations */
        .tui-panel:first-child .tui-panel-header .tui-panel-title::before { content: '▸ '; }
        .tui-panel:last-child .tui-panel-header .tui-panel-title::before { content: '▸ '; }
        
        /* Terminal */
        #terminal {
            height: 100%;
            background: var(--bg);
            padding: 10px;
        }
        
        /* File Browser */
        .file-list {
            padding: 0;
        }
        
        .file-item {
            display: flex;
            flex-direction: column;
            padding: 10px 15px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.1s;
        }
        .file-item:hover { background: var(--bg); }
        .file-item:hover .file-name { color: var(--green); }
        .file-item.selected { background: var(--bg); }
        .file-item.selected .file-name { color: var(--pink); }

            align-items: center;

        .file-icon.file { color: var(--fg); }
        .file-icon.article { color: var(--yellow); }
        .file-icon.back { color: var(--orange); }
        
        .file-name {

            font-size: 13px; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .file-meta { 
            color: var(--comment); 
            font-size: 11px;
            margin-top: 4px;
            padding-left: 26px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;

        .tui-breadcrumb {

            align-items: center;

            background: var(--bg);

        .tui-breadcrumb .sep { color: var(--comment); margin: 0 5px; }
        
        /* TUI Status Bar */
        .tui-statusbar {

            justify-content: space-between;

            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 0 0 4px 4px;

        .tui-statusbar-left { color: var(--comment); }
        .tui-statusbar-right { color: var(--comment); }
        .tui-statusbar-right span { color: var(--green); margin-left: 15px; }
        
        /* Preview Panel - TUI Style */
        .preview-panel {
            display: none;
            background: var(--bg-alt);
            border-left: 1px solid var(--border);

        .preview-panel.active {

        .preview-header {

            justify-content: space-between;

            background: var(--bg);

        .preview-title { color: var(--yellow); font-size: 14px; font-weight: bold; }
        .preview-close {

            font-family: inherit;
            font-size: 12px;
        }
        .preview-close:hover { background: var(--red); color: var(--bg); }
        
        .preview-meta {

            padding: 8px 15px;

        .preview-content {

        .preview-content h3 { color: var(--cyan); margin: 15px 0 8px; font-size: 14px; }

        .preview-content pre { background: var(--bg); padding: 12px; border-radius: 4px; overflow-x: auto; border: 1px solid var(--border); }

        .preview-content blockquote {

        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--comment); }
    </style>
</head>

            // 解析路径（支持相对路径和绝对路径）
            resolvePath(inputPath) {
                let targetPath;
                
                if (inputPath.startsWith('/')) {
                    targetPath = inputPath;
                } else if (inputPath === '~') {
                    targetPath = '/home';
                } else if (inputPath.startsWith('../')) {
                    const parts = cwd.split('/').filter(p => p);
                    parts.pop();
                    const relPath = inputPath.replace(/\.\.\//g, '').replace(/\.\//g, '');
                    const relParts = relPath.split('/').filter(p => p);
                    relParts.forEach(p => { if (p !== '..') parts.pop(); });
                    targetPath = '/' + [...parts, ...relPath.replace(/\.\.\//g, '').split('/').filter(p => p && p !== '..')].join('/');
                } else {
                    targetPath = cwd === '/home' ? '/home/' + inputPath : cwd + '/' + inputPath;
                }
                
                // 规范化路径
                const parts = targetPath.split('/').filter(p => p);
                const normalized = [];
                for (const part of parts) {
                    if (part === '..') {
                        normalized.pop();
                    } else if (part !== '.') {
                        normalized.push(part);
                    }
                }
                return '/' + normalized.join('/');
            },
            
            // 检查文件是否存在
            exists(path) {
                return this.files.hasOwnProperty(path);
            },
            
            // 获取文件
            getFile(path) {
                return this.files[path] || null;
            },
            
            // 列出目录内容
            listDir(path) {
                const dirs = [];
                const files = [];
                const prefix = path === '/home' ? '/home/' : path + '/';
                
                for (const filePath of Object.keys(this.files)) {
                    if (filePath.startsWith(prefix)) {
                        const remainder = filePath.substring(prefix.length);
                        const firstPart = remainder.split('/')[0];
                        
                        if (firstPart && !dirs.includes(firstPart)) {
                            dirs.push(firstPart);
                        }
                    }
                }
                
                // 添加直接在该目录下的文件
                for (const filePath of Object.keys(this.files)) {
                    const dir = filePath.substring(0, filePath.lastIndexOf('/'));
                    if (dir === path && !files.includes(filePath)) {
                        files.push(filePath.substring(path.length + 1));
                    }
                }
                
                return { dirs, files };
            },

                brightWhite: '#ffffff'
            }
        });
        
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal'));
        fitAddon.fit();

        let cwd = '/home';
        let input = '';
        const cmdHistory = [];
        let historyIndex = -1;
        let currentBrowsePath = '/home';

        // 初始化浏览器
        function initBrowser() {
            updateBrowserPath('/home');
            renderFileList('/home');
        }

        function updateBrowserPath(path) {
            currentBrowsePath = path;
            cwd = path;
            const parts = path.split('/').filter(p => p);
            let html = '<span onclick="navigateTo(\'/home\')">~</span>';
            let full = '/home';
            parts.slice(1).forEach(p => {
                full += '/' + p;
                html += ' / <span onclick="navigateTo(\'' + full + '\')">' + p + '</span>';
            });
            document.getElementById('browser-path').innerHTML = html;
            
            // 更新面包屑
            document.getElementById('breadcrumb').innerHTML = '<span onclick="navigateTo(\'/home\')">~</span>' + 
                parts.slice(1).map((p, i) => {
                    let fp = '/home/' + parts.slice(1, i + 2).join('/');
                    return ' <span class="sep">/</span> <span onclick="navigateTo(\'' + fp + '\')">' + p + '</span>';
                }).join('');
            
            // 更新状态栏
            document.getElementById('status-path').textContent = path;
        }

        function renderFileList(path) {
            const list = document.getElementById('file-list');
            const parts = path.split('/').filter(p => p);
            
            if (parts.length === 1) {
                // /home - 显示主目录
                let html = '';
                Object.keys(categories).forEach(key => {
                    const cat = categories[key];
                    const desc = cat.name === '技术文章' ? '前端、后端、运维等技术文章' : '生活随笔与个人分享';
                    html += `
                        <div class="file-item" onclick="enterCategory('${key}')">
                            <div class="file-item-header">
                                <span class="file-icon folder">${cat.icon}</span>
                                <span class="file-name">${cat.name}</span>
                            </div>
                            <span class="file-meta">${desc}</span>
                        </div>
                    `;
                });
                html += `
                    <div class="file-item" onclick="viewFile('readme.md')">
                        <div class="file-item-header">
                            <span class="file-icon file">📄</span>
                            <span class="file-name">readme.md</span>
                        </div>
                        <span class="file-meta">使用帮助与命令说明</span>
                    </div>
                `;
                list.innerHTML = html;
            } else if (parts.length === 2 && categories[parts[1]]) {
                // /home/articles 或 /home/posts - 显示子分类
                const cat = categories[parts[1]];
                const catDesc = parts[1] === 'articles' ? '技术文章分类' : '随笔文章分类';
                let html = `
                    <div class="file-item" onclick="goBack()">
                        <div class="file-item-header">
                            <span class="file-icon back">↩️</span>
                            <span class="file-name">返回上级</span>
                        </div>
                    </div>
                `;
                Object.keys(cat.children).forEach(key => {
                    const sub = cat.children[key];
                    const subDesc = sub.articles.length > 0 ? sub.articles[0].desc.substring(0, 20) + '...' : '';
                    html += `
                        <div class="file-item" onclick="enterSubCategory('${parts[1]}', '${key}')">
                            <div class="file-item-header">
                                <span class="file-icon folder">${sub.icon}</span>
                                <span class="file-name">${sub.name}</span>
                            </div>
                            <span class="file-meta">${sub.articles.length} 篇文章 · ${subDesc}</span>
                        </div>
                    `;
                });
                list.innerHTML = html;
            } else if (parts.length === 3) {
                // /home/articles/frontend 等 - 显示文章列表
                const catName = parts[1];
                const subName = parts[2];
                const cat = categories[catName];
                const sub = cat?.children[subName];
                if (sub) {
                    let html = `
                        <div class="file-item" onclick="goBack()">
                            <div class="file-item-header">
                                <span class="file-icon back">↩️</span>
                                <span class="file-name">返回上级</span>
                            </div>
                        </div>
                    `;
                    sub.articles.forEach(art => {
                        html += `
                            <div class="file-item" onclick="previewArticle(${art.id})">
                                <div class="file-item-header">
                                    <span class="file-icon article">📄</span>
                                    <span class="file-name">${art.title}</span>
                                </div>
                                <span class="file-meta">${art.author} · ${art.date}</span>
                            </div>
                        `;
                    });
                    list.innerHTML = html;
                }
            }
        }

        function enterCategory(key) {
            const path = '/home/' + key;
            cwd = path;
            updateBrowserPath(path);
            renderFileList(path);
            term.writeln('\x1b[32m[cd ' + key + ']\x1b[0m');
            term.writeln('\x1b[90mUse \x1b[36mls\x1b[90m to view contents, \x1b[36mcd <name>\x1b[90m to enter subdirectory\x1b[0m');
            term.writeln('');
            term.write('\x1b[1m\x1b[36m' + cwd + '$\x1b[0m ');
        }

        function enterSubCategory(cat, sub) {
            const path = '/home/' + cat + '/' + sub;
            cwd = path;
            updateBrowserPath(path);
            renderFileList(path);
            term.writeln('\x1b[32m[cd ' + sub + ']\x1b[0m');
            term.writeln('\x1b[90mUse \x1b[36mls\x1b[90m to list articles, \x1b[36mread <id>\x1b[90m to preview\x1b[0m');
            term.writeln('');
            term.write('\x1b[1m\x1b[36m' + cwd + '$\x1b[0m ');
        }

        function navigateTo(path) {
            cwd = path;
            updateBrowserPath(path);
            renderFileList(path);
            
            // 显示当前路径和提示
            const parts = cwd.split('/').filter(p => p);
            if (parts.length === 1) {
                term.writeln('\x1b[90mWelcome to home directory.\x1b[0m');
            } else if (parts.length === 2) {
                term.writeln('\x1b[90mEntering ' + parts[1] + ' directory...\x1b[0m');
                term.writeln('\x1b[33mUse \x1b[36mls\x1b[33m to view contents, \x1b[36mcd <dir>\x1b[33m to enter.\x1b[0m');
            } else if (parts.length === 3) {
                term.writeln('\x1b[90mEntering ' + parts[2] + '...\x1b[0m');
                term.writeln('\x1b[33mUse \x1b[36mls\x1b[33m to list articles.\x1b[0m');
            }
            term.writeln('');
            term.write('\x1b[1m\x1b[36m' + cwd + '$\x1b[0m ');
        }

        function goBack() {
            const parts = cwd.split('/').filter(p => p);
            if (parts.length > 1) {
                parts.pop();
                const newPath = parts.length === 1 ? '/home' : '/' + parts.join('/');
                navigateTo(newPath);
            }
        }

        function viewFile(filename) {
            // 解析路径
            const fullPath = VirtualFileSystem.resolvePath(filename);
            const file = VirtualFileSystem.getFile(fullPath);
            
            if (!file) {
                term.writeln('\x1b[31mcat: ' + filename + ': No such file or directory\x1b[0m');
                return;
            }
            
            // 根据文件类型处理
            switch (file.type) {
                case 'md':
                    // 在终端显示 Markdown 内容
                    readArticleInTerminal(fullPath);
                    break;
                case 'pdf':
                case 'doc':
                    // 这些类型需要在预览面板打开
                    previewFile(fullPath);
                    break;
                default:
                    term.writeln(file.content || '\x1b[33m[Binary file - use "open" to preview]\x1b[0m');
            }
        }
        
        // 在终端读取文章
        function readArticleInTerminal(filePath) {
            const file = VirtualFileSystem.getFile(filePath);
            if (!file) {
                term.writeln('\x1b[31mcat: file not found\x1b[0m');
                return;
            }
            
            term.writeln('\x1b[1m\x1b[36m# ' + file.title + '\x1b[0m');
            if (file.meta) {
                let metaStr = '\x1b[90m';
                if (file.meta.date) metaStr += 'Date: ' + file.meta.date;
                if (file.meta.author) metaStr += ' | Author: ' + file.meta.author;
                if (file.meta.tags) metaStr += ' | Tags: ' + file.meta.tags.join(', ');
                metaStr += '\x1b[0m';
                term.writeln(metaStr);
            }
            term.writeln('');
            
            // 简单渲染 Markdown（标题、加粗、代码块）
            const content = file.content || '';
            const lines = content.split('\n');
            lines.forEach(line => {
                if (line.startsWith('# ')) {
                    term.writeln('\x1b[1m\x1b[36m' + line.substring(2) + '\x1b[0m');
                } else if (line.startsWith('## ')) {
                    term.writeln('\x1b[1m\x1b[33m' + line.substring(3) + '\x1b[0m');
                } else if (line.startsWith('```')) {
                    term.writeln('\x1b[90m' + line + '\x1b[0m');
                } else if (line.startsWith('- ')) {
                    term.writeln('  \x1b[32m•\x1b[0m ' + line.substring(2));
                } else if (line.startsWith('1. ') || line.startsWith('2. ') || line.startsWith('3. ')) {
                    term.writeln('  \x1b[33m' + line + '\x1b[0m');
                } else if (line.startsWith('|')) {
                    term.writeln('\x1b[90m' + line + '\x1b[0m');
                } else {
                    term.writeln(line || '');
                }
            });
            term.writeln('');
        }
        
        // 预览文件（侧边栏预览面板）
        function previewFile(filePath) {
            const file = VirtualFileSystem.getFile(filePath);
            if (!file) {
                term.writeln('\x1b[31mopen: file not found\x1b[0m');
                return;
            }
            
            document.getElementById('preview-title').textContent = file.title || filePath.split('/').pop();
            
            let metaHtml = '';
            if (file.meta) {
                if (file.meta.date) metaHtml += '📅 ' + file.meta.date;
                if (file.meta.author) metaHtml += ' | 👤 ' + file.meta.author;
                if (file.meta.tags) {
                    metaHtml += ' | ' + file.meta.tags.map(t => `<span style="background:#333;padding:2px 8px;border-radius:4px;margin-right:5px;">${t}</span>`).join('');
                }
                if (file.meta.id) metaHtml += `\n                    <span style="color:var(--green)">[ID: ${file.meta.id}]</span>`;
            }
            metaHtml += `\n                    <span style="color:var(--cyan)">[${file.type.toUpperCase()}]</span>`;
            document.getElementById('preview-meta').innerHTML = metaHtml;
            
            let content = '';
            if (file.type === 'pdf' || file.type === 'doc') {
                if (file.url) {
                    content = `<div style="padding:20px;text-align:center;"><p style="color:var(--yellow);">📄 ${file.title}</p><p style="color:var(--comment);margin-top:10px;">This is a ${file.type.toUpperCase()} document.</p><p style="color:var(--comment);">In production, this would display the embedded document.</p><a href="${file.url}" target="_blank" style="display:inline-block;margin-top:20px;padding:10px 20px;background:var(--cyan);color:var(--bg);text-decoration:none;border-radius:4px;">Download/Open</a></div>`;
                } else {
                    content = `<div style="padding:20px;"><pre style="background:var(--bg);padding:15px;border-radius:4px;border:1px solid var(--border);">${file.content}</pre></div>`;
                }
            } else {
                content = `<pre style="background:var(--bg);padding:15px;border-radius:4px;border:1px solid var(--border);white-space:pre-wrap;word-wrap:break-word;line-height:1.6;">${escapeHtml(file.content || '')}</pre>`;
            }
            
            document.getElementById('preview-content').innerHTML = content;
            document.getElementById('preview-panel').classList.add('active');
            document.getElementById('browser-panel').classList.add('narrow');
            
            term.writeln('\x1b[32m[Previewing: ' + file.title + ']\x1b[0m');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function previewArticle(id) {
            // 查找文章
            let article = null;
            Object.values(categories).forEach(cat => {
                Object.values(cat.children).forEach(sub => {
                    const found = sub.articles.find(a => a.id === id);
                    if (found) article = found;
                });
            });
            
            if (article) {
                document.getElementById('preview-title').textContent = article.title;
                document.getElementById('preview-meta').innerHTML = `📅 ${article.date} | 👤 ${article.author} | ${article.tags.map(t => `<span style="background:#333;padding:2px 8px;border-radius:4px;margin-right:5px;">${t}</span>`).join('')}`;
                
                let content = `<p>${article.desc}</p><br><h2>文章内容</h2><p>这是文章的详细内容区域，支持富文本、代码、图片等格式。</p>`;
                if (article.images) {
                    article.images.forEach(img => {
                        content += `<br><img src="${img}" alt="${article.title}">`;
                    });
                }
                
                document.getElementById('preview-content').innerHTML = content;
                document.getElementById('preview-panel').classList.add('active');
                document.getElementById('browser-panel').classList.add('narrow');
                
                term.writeln('\x1b[32m[Opening article: ' + article.title + ']\x1b[0m');
                term.writeln('\x1b[34m' + cwd + '$\x1b[0m ');
            }
        }

        function closePreview() {
            document.getElementById('preview-panel').classList.remove('active');
            document.getElementById('browser-panel').classList.remove('narrow');
            document.getElementById('browser-panel').style.width = '';
        }

        function refreshBrowser() {
            renderFileList(currentBrowsePath);
            term.writeln('\x1b[32m[Refreshed]\x1b[0m');
            term.writeln('\x1b[34m' + cwd + '$\x1b[0m ');
        }

        function termClear() {
            term.clear();
            term.writeln('\x1b[1m\x1b[35mWebShell Blog v1.0\x1b[0m \x1b[90m// Terminal-style Blog System\x1b[0m');
            term.writeln('\x1b[90mType \x1b[36m"help"\x1b[90m for available commands.\x1b[0m');
            term.writeln('');
            term.write('\x1b[1m\x1b[36m' + cwd + '$\x1b[0m ');
        }

        // ==================== 终端命令处理 ====================
        term.writeln('\x1b[1m\x1b[35mWebShell Blog v1.0\x1b[0m \x1b[90m// Terminal-style Blog System\x1b[0m');
        term.writeln('\x1b[90mType \x1b[36m"help"\x1b[90m for available commands.\x1b[0m');
        term.writeln('');
        term.writeln('\x1b[33mQuick Start:\x1b[0m');
        term.writeln('  \x1b[36mls\x1b[0m              View directories');
        term.writeln('  \x1b[36mcd articles\x1b[0m     Enter articles folder');
        term.writeln('  \x1b[36mread 1\x1b[0m          Read article');
        term.writeln('');
        term.write('\x1b[1m\x1b[36m' + cwd + '$\x1b[0m ');

        term.onData(data => {
            if (data === '\r') {
                term.writeln('');
                const cmd = input.trim();
                if (cmd) {
                    cmdHistory.push(cmd);
                    historyIndex = cmdHistory.length;
                }
                processCommand(cmd);
                input = '';
                term.write('\x1b[1m\x1b[36m' + cwd + '$\x1b[0m ');
            } else if (data === '\x7f') {
                if (input.length > 0) {
                    input = input.slice(0, -1);
                    redrawInput();
                }
            } else if (data === '\x1b[A') {
                if (cmdHistory.length > 0 && historyIndex > 0) {
                    historyIndex--;
                    input = cmdHistory[historyIndex];
                    redrawInput();
                }
            } else if (data === '\x1b[B') {
                if (historyIndex < cmdHistory.length - 1) {
                    historyIndex++;
                    input = cmdHistory[historyIndex];
                } else {
                    historyIndex = cmdHistory.length;
                    input = '';
                }
                redrawInput();
            } else if (data === '\x03') {
                input = '';
                term.writeln('^C');
                term.write('\x1b[1m\x1b[36m' + cwd + '$\x1b[0m ');
            } else if (data === '\t') {
                const result = tabComplete(input);
                if (result.showItems) {
                    // 空输入时显示目录列表后重新显示提示符
                    term.writeln('');
                    term.write('\x1b[1m\x1b[36m' + cwd + '$\x1b[0m ');
                } else if (result.input !== input) {
                    input = result.input;
                    redrawInput();
                }
            } else {
                input += data;
                term.write(data);
            }
        });
        
        // 重新绘制当前输入行（正确处理中文）
        function redrawInput() {
            // 回到行首，清除到行尾，重新绘制
            term.write('\r\x1b[K' + '\x1b[1m\x1b[36m' + cwd + '$\x1b[0m ' + input);
        }

        // Tab completion
        function tabComplete(input) {
            const commands = ['ls', 'll', 'cd', 'cat', 'pwd', 'clear', 'cls', 'read', 'echo', 'help', 'history', 'whoami', 'date', 'exit', 'man', 'uname'];
            
            // If input is empty, show current directory contents
            if (!input.trim()) {
                let items = [];
                if (cwd === '/home') {
                    items = ['articles/', 'posts/', 'readme.md'];
                } else if ((cwd.startsWith('/home/articles') || cwd.startsWith('/home/posts')) && cwd.split('/').length === 3) {
                    const catKey = cwd.split('/')[2];
                    const cat = categories[catKey];
                    if (cat) {
                        items = Object.values(cat.children).map(c => c.name + '/');
                    }
                } else if (cwd.startsWith('/home/articles/') || cwd.startsWith('/home/posts/')) {
                    const catKey = cwd.split('/')[2];
                    const cat = categories[catKey];
                    if (cat) {
                        for (const key in cat.children) {
                            if (cat.children[key]) {
                                items.push(cat.children[key].articles.map(a => a.id + '.md'));
                            }
                        }
                        items = items.flat();
                    }
                }
                if (items.length > 0) {
                    term.writeln(items.join('    '));
                }
                return { input: input, showItems: true };
            }
            
            const parts = input.trim().split(/\s+/);
            
            if (parts.length === 1) {
                // Complete command name
                const cmd = parts[0];
                const matches = commands.filter(c => c.startsWith(cmd));
                if (matches.length === 1) {
                    return { input: matches[0] + ' ' };
                } else if (matches.length > 1) {
                    term.writeln('');
                    term.writeln(matches.join('  '));
                }
                return { input: input };
            }
            
            const cmd = parts[0];
            const arg = parts[1] || '';
            
            // ls 命令补全
            if (cmd === 'ls') {
                const lsOptions = ['-l', '-a', '-al', '-la'];
                if (!arg.startsWith('-')) {
                    return { input: cmd + ' -l ' };
                }
                const matches = lsOptions.filter(o => o.startsWith(arg));
                if (matches.length === 1) {
                    return { input: cmd + ' ' + matches[0] + ' ' };
                } else if (matches.length > 1) {
                    term.writeln('');
                    term.writeln(matches.join('  '));
                }
                return { input: input };
            }
            
            // ll 命令（等同于 ls -la）
            if (cmd === 'll') {
                return { input: cmd + ' ' };
            }
            
            if (cmd === 'cd' || cmd === 'cat' || cmd === 'read') {
                let completions = [];
                
                if (cmd === 'cd') {
                    // 支持相对路径补全，如 ../, ../
                    if (arg.startsWith('..')) {
                        // 计算相对路径目标目录
                        let targetCwd = cwd;
                        const parts = arg.split('/').filter(p => p);
                        for (const p of parts) {
                            if (p === '..') {
                                const currentParts = targetCwd.split('/').filter(pp => pp);
                                if (currentParts.length > 1) {
                                    currentParts.pop();
                                    targetCwd = '/' + currentParts.join('/');
                                }
                            }
                        }
                        
                        // 获取目标目录的内容
                        if (targetCwd === '/home') {
                            completions = Object.keys(categories);
                        } else if ((targetCwd.startsWith('/home/articles') || targetCwd.startsWith('/home/posts')) && targetCwd.split('/').length === 3) {
                            const catKey = targetCwd.split('/')[2];
                            const cat = categories[catKey];
                            if (cat) {
                                completions = Object.values(cat.children).map(c => c.name);
                            }
                        }
                        
                        // 加上相对路径前缀
                        const prefix = arg.replace(/[^/]/g, ''); // 保留 ../
                        completions = completions.map(c => prefix + c);
                    } else {
                        // 普通目录补全
                        if (cwd === '/home') {
                            completions = Object.keys(categories);
                            // 添加 .. 父目录选项
                            completions.unshift('..');
                        } else if ((cwd.startsWith('/home/articles') || cwd.startsWith('/home/posts')) && cwd.split('/').length === 3) {
                            const catKey = cwd.split('/')[2];
                            const cat = categories[catKey];
                            if (cat) {
                                completions = Object.values(cat.children).map(c => c.name);
                            }
                            // 添加 ../ 父目录选项
                            completions.unshift('../');
                        } else if (cwd.startsWith('/home/articles/') || cwd.startsWith('/home/posts/')) {
                            // 在子目录时，添加 ../ 返回上级
                            completions = ['../'];
                        }
                    }
                } else if (cmd === 'cat' || cmd === 'read') {
                    // Complete file/article names
                    if (arg === 'readme' || arg === 'readme.md') {
                        return { input: 'cat readme.md ' };
                    }
                    
                    if (cwd === '/home/articles' || cwd === '/home/posts') {
                        const catKey = cwd.split('/')[2];
                        const cat = categories[catKey];
                        if (cat) {
                            // 返回子分类的 name
                            completions = Object.values(cat.children).map(c => c.name);
                        }
                    } else if (cwd.startsWith('/home/articles/') || cwd.startsWith('/home/posts/')) {
                        const catKey = cwd.split('/')[2];
                        const cat = categories[catKey];
                        if (cat) {
                            // 找到匹配的子分类
                            for (const key in cat.children) {
                                if (key === arg || cat.children[key].name === arg) {
                                    const sub = cat.children[key];
                                    completions = sub.articles.map(a => String(a.id) + '.md');
                                    break;
                                }
                            }
                        }
                    }
                }
                
                // Filter by partial input
                if (arg) {
                    completions = completions.filter(c => c.startsWith(arg));
                }
                
                if (completions.length === 1) {
                    return { input: cmd + ' ' + completions[0] + (cmd === 'cd' ? '' : ' ') };
                } else if (completions.length > 1) {
                    term.writeln('');
                    term.writeln(completions.join('  '));
                }
                return { input: input };
            }
            
            return { input: input };
        }

        function processCommand(cmd) {
            const parts = cmd.trim().split(/\s+/);
            const c = parts[0].toLowerCase();
            const args = parts.slice(1);

            switch(c) {
                case '':
                    break;
                case 'help':
                case 'man':
                    showHelp();
                    break;
                case 'ls':
                case 'll':
                    ls(args, c === 'll');
                    break;
                case 'cd':
                    cd(args);
                    break;
                case 'cat':
                    cat(args);
                    break;
                case 'open':
                    open(args);
                    break;
                case 'read':
                    readArticle(args);
                    break;
                case 'pwd':
                    term.writeln(cwd);
                    break;
                case 'clear':
                case 'cls':
                    term.clear();
                    term.writeln('\x1b[1m\x1b[35mWebShell Blog v1.0\x1b[0m \x1b[90m// Terminal-style Blog System\x1b[0m');
                    term.writeln('\x1b[90mType \x1b[36m"help"\x1b[90m for available commands.\x1b[0m');
                    term.writeln('');
                    term.write('\x1b[1m\x1b[36m' + cwd + '$\x1b[0m ');
                    break;
                case 'echo':
                    echo(args);
                    break;
                case 'whoami':
                    term.writeln('user');
                    break;
                case 'date':
                    term.writeln(new Date().toString());
                    break;
                case 'uname':
                    term.writeln(args.includes('-a') ? 
                        'WebShell Blog 1.0.0 x86_64 JavaScript/HTML/CSS' : 
                        'WebShell Blog');
                    break;
                case 'history':
                    history();
                    break;
                case 'exit':
                    term.writeln('\x1b[33mLogout not supported in web mode.\x1b[0m');
                    break;
                case 'about':
                    showAbout();
                    break;
                default:
                    term.writeln('\x1b[31mbash: ' + c + ': command not found\x1b[0m');
            }
        }

        function showHelp() {
            term.writeln('\x1b[1m\x1b[35mWebShell Blog v1.0\x1b[0m \x1b[90m// Terminal-style Blog System\x1b[0m');
            term.writeln('');
            term.writeln('\x1b[33mNavigation:\x1b[0m');
            term.writeln('  \x1b[36mls\x1b[0m              List directory contents');
            term.writeln('  \x1b[36mll\x1b[0m              List with details');
            term.writeln('  \x1b[36mcd <dir>\x1b[0m         Change directory');
            term.writeln('  \x1b[36mpwd\x1b[0m              Print working directory');
            term.writeln('');
            term.writeln('\x1b[33mFile Operations:\x1b[0m');
            term.writeln('  \x1b[36mcat <file>\x1b[0m        Read file in terminal');
            term.writeln('  \x1b[36mopen <file>\x1b[0m       Preview file in side panel');
            term.writeln('  \x1b[36mread <id>\x1b[0m          Read article by ID');
            term.writeln('');
            term.writeln('\x1b[33mSystem:\x1b[0m');
            term.writeln('  \x1b[36mclear\x1b[0m             Clear screen');
            term.writeln('  \x1b[36mecho <text>\x1b[0m       Print text');
            term.writeln('  \x1b[36mhistory\x1b[0m            Show command history');
            term.writeln('  \x1b[36mabout\x1b[0m              About this blog');
            term.writeln('');
            term.writeln('\x1b[90mTip: Tab for autocomplete, ↑↓ for history\x1b[0m');
        }

        function ls(args, isLl = false) {
            const showLong = isLl || args.includes('-l') || args.includes('-la') || args.includes('-al');
            const showAll = args.includes('-a') || args.includes('-al') || args.includes('-la');
            
            // 解析目标目录
            let targetPath = cwd;
            const pathArg = args.find(a => !a.startsWith('-'));
            if (pathArg) {
                targetPath = VirtualFileSystem.resolvePath(pathArg);
            }
            
            const listing = VirtualFileSystem.listDir(targetPath);
            
            // 父目录链接
            if (showAll && targetPath !== '/home') {
                term.writeln('\x1b[33mdrwxr-xr-x   - \x1b[90m..\x1b[0m');
            }
            
            // 目录列表
            const allDirs = [...listing.dirs].sort();
            const allFiles = [...listing.files].sort();
            
            if (showLong) {
                term.writeln('\x1b[1mtotal ' + (allDirs.length + allFiles.length) + '\x1b[0m');
                
                allDirs.forEach(dir => {
                    const icon = VirtualFileSystem.getIcon(dir + '/');
                    term.writeln('\x1b[36mdrwxr-xr-x   2 \x1b[90muser  staff   \x1b[36m' + dir + '/\x1b[0m');
                });
                
                allFiles.forEach(file => {
                    const filePath = targetPath + '/' + file;
                    const fileData = VirtualFileSystem.getFile(filePath);
                    const icon = VirtualFileSystem.getIcon(file);
                    const size = fileData ? (fileData.content ? fileData.content.length : 0) : 0;
                    const date = fileData?.meta?.date || '2024-01-01';
                    term.writeln('\x1b[33m-rw-r--r--   1 \x1b[90muser  staff  \x1b[33m' + String(size).padStart(5) + ' \x1b[90m' + date + ' \x1b[33m' + file + '\x1b[0m');
                });
            } else {
                const items = [];
                allDirs.forEach(dir => items.push('\x1b[36m' + dir + '/'));
                allFiles.forEach(file => items.push('\x1b[33m' + file));
                
                if (items.length === 0) {
                    term.writeln('\x1b[90m(empty directory)\x1b[0m');
                } else {
                    term.writeln(items.join('  '));
                }
            }
        }
        
        // open 命令 - 在预览面板打开文件
        function open(args) {
            if (args.length === 0) {
                term.writeln('\x1b[31mopen: missing file operand\x1b[0m');
                return;
            }
            
            const filePath = VirtualFileSystem.resolvePath(args[0]);
            const file = VirtualFileSystem.getFile(filePath);
            
            if (!file) {
                // 尝试作为目录
                const listing = VirtualFileSystem.listDir(filePath);
                if (listing.dirs.length > 0 || listing.files.length > 0) {
                    term.writeln('\x1b[33mopen: ' + args[0] + ': Is a directory\x1b[0m');
                    term.writeln('\x1b[90mUse "cd" to enter directory, "ls" to list contents\x1b[0m');
                } else {
                    term.writeln('\x1b[31mopen: ' + args[0] + ': No such file\x1b[0m');
                }
                return;
            }
            
            previewFile(filePath);
        }

        function cd(args) {
            if (args.length === 0 || args[0] === '~') {
                cwd = '/home';
            } else if (args[0] === '/') {
                cwd = '/home';
            } else {
                // 解析相对路径
                let targetCwd = cwd;
                const input = args[0];
                
                // 处理 ../
                const parts = input.split('/');
                for (const part of parts) {
                    if (part === '..') {
                        const currentParts = targetCwd.split('/').filter(p => p);
                        if (currentParts.length > 1) {
                            currentParts.pop();
                            targetCwd = currentParts.length === 0 ? '/home' : '/' + currentParts.join('/');
                        }
                    } else if (part && part !== '.') {
                        // 尝试进入子目录
                        let found = false;
                        
                        if (targetCwd === '/home') {
                            if (categories[part]) {
                                targetCwd = '/home/' + part;
                                found = true;
                            }
                        } else if ((targetCwd.startsWith('/home/articles') || targetCwd.startsWith('/home/posts')) && targetCwd.split('/').length === 3) {
                            const catKey = targetCwd.split('/')[2];
                            const cat = categories[catKey];
                            if (cat) {
                                for (const key in cat.children) {
                                    if (key === part || cat.children[key].name === part) {
                                        targetCwd = '/home/' + catKey + '/' + key;
                                        found = true;
                                        break;
                                    }
                                }
                            }
                        }
                    }
                }
                
                cwd = targetCwd;
            }
            
            updateBrowserPath(cwd);
            renderFileList(cwd);
            
            // Show helpful hints
            const p = cwd.split('/').filter(pp => pp);
            if (p.length === 1) {
                term.writeln('\x1b[90mBack to home directory.\x1b[0m');
            } else if (p.length === 2) {
                term.writeln('\x1b[90mUse \x1b[36mls\x1b[90m to view contents, \x1b[36mcd <name>\x1b[90m to enter\x1b[0m');
            } else if (p.length === 3) {
                term.writeln('\x1b[90mUse \x1b[36mls\x1b[90m to list articles\x1b[0m');
            }
        }

        function cat(args) {
            if (args.length === 0) {
                term.writeln('\x1b[31mcat: missing operand\x1b[0m');
                return;
            }
            viewFile(args[0]);
        }

        function readArticle(args) {
            if (args.length === 0) {
                term.writeln('\x1b[31mread: missing article id\x1b[0m');
                return;
            }
            const id = parseInt(args[0]);
            if (isNaN(id)) {
                term.writeln('\x1b[31mread: invalid article id: ' + args[0] + '\x1b[0m');
                return;
            }
            
            // 使用 VirtualFileSystem 查找文章
            const article = VirtualFileSystem.findById(id);
            if (article) {
                // 在终端读取
                readArticleInTerminal(article.path);
            } else {
                term.writeln('\x1b[31mread: article ' + id + ' not found\x1b[0m');
            }
        }

        function echo(args) {
            term.writeln(args.join(' '));
        }

        function history() {
            cmdHistory.forEach((cmd, i) => {
                term.writeln('\x1b[90m ' + (i + 1) + '  \x1b[0m' + cmd);
            });
        }
        
        function showAbout() {
            term.writeln('');
            term.writeln('\x1b[1m\x1b[35m╔══════════════════════════════════════════════════════╗\x1b[0m');
            term.writeln('\x1b[1m\x1b[35m║\x1b[0m  \x1b[1m\x1b[36mWebShell Blog\x1b[0m                                      \x1b[1m\x1b[35m║\x1b[0m');
            term.writeln('\x1b[1m\x1b[35m║\x1b[0m  \x1b[90mA terminal-style blog system\x1b[0m                   \x1b[1m\x1b[35m║\x1b[0m');
            term.writeln('\x1b[1m\x1b[35m╠══════════════════════════════════════════════════════╣\x1b[0m');
            term.writeln('\x1b[1m\x1b[35m║\x1b[0m  \x1b[33mAuthor:\x1b[0m  Admin                                   \x1b[1m\x1b[35m║\x1b[0m');
            term.writeln('\x1b[1m\x1b[35m║\x1b[0m  \x1b[33mVersion:\x1b[0m 1.0.0                                  \x1b[1m\x1b[35m║\x1b[0m');
            term.writeln('\x1b[1m\x1b[35m║\x1b[0m  \x1b[33mStack:\x1b[0m  Xterm.js + Vanilla JS                    \x1b[1m\x1b[35m║\x1b[0m');
            term.writeln('\x1b[1m\x1b[35m╚══════════════════════════════════════════════════════╝\x1b[0m');
            term.writeln('');
            term.writeln('\x1b[90mType \x1b[36m"help"\x1b[90m to see available commands.\x1b[0m');
            term.writeln('');
        }

        // ==================== Resize Handle ====================
        function initResizeHandle() {
            const handle = document.getElementById('resize-handle');
            const terminalPanel = document.getElementById('terminal-panel');
            const browserPanel = document.getElementById('browser-panel');
            let isResizing = false;
            
            handle.addEventListener('mousedown', (e) => {
                isResizing = true;
                handle.classList.add('active');
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
            });
            
            document.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                
                const containerRect = document.querySelector('.panels-wrapper').getBoundingClientRect();
                const minTerminalWidth = 300;
                const maxTerminalWidth = containerRect.width - 280;
                
                let newWidth = e.clientX - containerRect.left;
                newWidth = Math.max(minTerminalWidth, Math.min(newWidth, maxTerminalWidth));
                
                terminalPanel.style.flex = 'none';
                terminalPanel.style.width = newWidth + 'px';
            });
            
            document.addEventListener('mouseup', () => {
                if (isResizing) {
                    isResizing = false;
                    handle.classList.remove('active');
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                    fitAddon.fit();
                }
            });
        }
        
        // 初始化
        initBrowser();
        initResizeHandle();
        window.onresize = () => fitAddon.fit();
    </script>
