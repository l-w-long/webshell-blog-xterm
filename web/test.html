<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Terminal</title>
    <link rel="stylesheet" href="https://unpkg.com/xterm@5.3.0/css/xterm.css">
</head>
<body>
    <div id="terminal" style="width:100vw;height:100vh;"></div>
    <script src="https://unpkg.com/xterm@5.3.0/lib/xterm.min.js"></script>
    <script>
        const term = new Terminal();
        term.open(document.getElementById('terminal'));
        term.write('Hello! Type something: ');
        term.onData(data => {
            term.write(data);
        });
    </script>
</body>
</html>
